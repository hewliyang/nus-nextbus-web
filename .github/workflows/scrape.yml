name: Weekly Scrape

on:
  schedule:
    - cron: '0 0 * * 1,4' # run on Mon and Thurs

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run scraping script
        env:
          # Required - configure these as repository secrets:
          #   Settings -> Secrets and variables -> Actions -> New repository secret
          # The script aborts if any required value is missing. See docs/secrets.md.
          NEXTBUS_AUTH_BASE: ${{ secrets.NEXTBUS_AUTH_BASE }}
          NEXTBUS_FMS_BASE: ${{ secrets.NEXTBUS_FMS_BASE }}
          NEXTBUS_APP_VERSION: ${{ secrets.NEXTBUS_APP_VERSION }}
          NEXTBUS_HTD_API: ${{ secrets.NEXTBUS_HTD_API }}
          NEXTBUS_APP_API: ${{ secrets.NEXTBUS_APP_API }}
          NEXTBUS_FMS_SERVICE_ID: ${{ secrets.NEXTBUS_FMS_SERVICE_ID }}
          NEXTBUS_FMS_TENANT_CODE: ${{ secrets.NEXTBUS_FMS_TENANT_CODE }}
          # Optional parity headers (safe to leave unset):
          NEXTBUS_REQUESTED_BY: ${{ secrets.NEXTBUS_REQUESTED_BY }}
          NEXTBUS_SECURED_REQUEST: ${{ secrets.NEXTBUS_SECURED_REQUEST }}
        run: python scripts/scrape.py

      - name: Commit and push any changes
        run: |
          git diff --exit-code || {
            git config --global user.email "actions@github.com"
            git config --global user.name "GitHub Actions"
            git add .
            git commit -m "gh-actions: update routes & stops"
            git push
          }
